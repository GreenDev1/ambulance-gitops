apiVersion: polyfea.github.io/v1alpha1
kind: WebComponent
metadata:
  name: nl-ambulance-ufe-content
spec:
  microFrontend: nl-ambulance-ufe
  element: nl-ambulance-wl-app
  attributes:
    - name: base-path
      value: /nl-ambulance-wl/  
    - name: api-base
      value: http://localhost:5000/api
    - name: ambulance-id
      value: bobulova
  displayRules:
    - allOf:
      - context-name: main-content
      - path: "^(\\.?/)?nl-ambulance-wl(/.*)?$"